<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="text">Hi, I'm <span class="type"></span></div>

        var typed = new Typed(".type", {

        typeSpeed: 80,
        backSpeed: 60,
        loop: true,
      });
    </script>
